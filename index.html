<style>

  body {

    color: #333;

    height: 100vh;
    width: 100vw;

  .header {
    position: fixed;
    top: 0; left: 0; right: 0;

    background: rgba(245, 240, 232, 0.95);
    backdrop-filter: blur(10px);

    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title {
    font-size: 18px;
    font-weight: 700;
    color: #3C4F6D;
    letter-spacing: 1px;
  }
  .header-instructor {
    font-size: 13px;
    color: #56642A;
    margin-top: 3px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .header-instructor:hover {
    color: #3C4F6D;
    text-decoration: underline;
  }
  .corner-hint {

    bottom: 68px;
    right: 20px;
    z-index: 90;
    font-size: 10px;
    color: #999;
    pointer-events: none;
  }
  .legend {
    display: flex;
    gap: 18px;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #555;
  }
  .legend-dot {
    width: 13px; height: 13px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-tag {
    background: #56642A;
    color: #fff;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    margin-left: 3px;
  }

  .controls {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .ctrl-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid #d5d0c7;
    background: #fff;
    color: #4A686A;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    transition: all 0.2s;
  }
  .ctrl-btn:hover { background: #f0f4f4; transform: scale(1.05); }

  #graph-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 90;
    background: rgba(255,255,255,0.85);

    padding: 6px 16px;
    border-radius: 16px;
    font-size: 11px;
    color: #888;
    border: 1px solid #e8e3db;
    pointer-events: none;
  }

  .tooltip {
    position: fixed;
    background: rgba(50,55,60,0.9);
    color: #fff;
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 11px;
    pointer-events: none;
    z-index: 150;
    opacity: 0;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .tooltip.active { opacity: 1; }

  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .modal-overlay.active { display: flex; opacity: 1; }
  .modal-card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 16px 50px rgba(0,0,0,0.18);
    max-height: 82vh;
    overflow-y: auto;
    position: relative;
    animation: modalIn 0.3s ease-out;
  }

    from { transform: translateY(16px) scale(0.96); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }
  .modal-close {
    position: absolute;
    top: 14px; right: 14px;
    width: 30px; height: 30px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.25);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: all 0.2s;
  }

  .card-level1 { width: 600px; max-width: 90vw; }

    background: #3C4F6D;
    color: #fff;
    padding: 22px 28px;
    border-radius: 14px 14px 0 0;
  }
  .card-level1 .card-header h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .card-level1 .duration-tag {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    padding: 3px 12px;
    border-radius: 10px;
    font-size: 12px;
  }
  .card-level1 .card-body {
    padding: 22px 28px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .card-section h3 {
    font-size: 12px;
    color: #56642A;
    font-weight: 700;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;

  .card-section li { margin-bottom: 4px; }
  .intro-text {
    grid-column: 1 / -1;
    background: #f5f7f7;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.7;
    color: #555;
  }

  /* Level 2 */
  .card-level2 { width: 440px; max-width: 90vw; }
  .card-level2 .card-header {
    padding: 20px 24px;
    border-radius: 14px 14px 0 0;
    color: #fff;

  .card-level2 .card-header.green { background: #56642A; }
  .card-level2 .card-header.gray  { background: #4A686A; }
  .card-level2 .card-header h2 { font-size: 15px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; }
  .card-level2 .halfday-tag {

    background: rgba(255,255,255,0.2);

    border-radius: 8px;
    font-size: 11px;
    margin-right: 6px;

    background: #fff;
    color: #56642A;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 700;
  }
  .card-level2 .card-body { padding: 20px 24px; }
  .card-level2 .objective {
    background: #f5f7f7;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.6;
    color: #555;
    margin-bottom: 14px;

  .knowledge-preview { margin-top: 12px; }

  .knowledge-preview .kp-item {

    font-size: 11px;
    color: #555;

  .kp-dot { width: 5px; height: 5px; border-radius: 50%; background: #FDB137; margin-top: 6px; flex-shrink: 0; }
  .solo-highlight {
    background: #f0f4ec;
    border-left: 3px solid #56642A;
    padding: 8px 12px;
    border-radius: 0 6px 6px 0;
    margin-top: 12px;
    font-size: 11px;
    color: #555;
    line-height: 1.6;
  }

  /* Level 3 */
  .card-level3 { width: 380px; max-width: 90vw; }
  .card-level3 .card-header {
    background: #FDB137;
    color: #fff;
    padding: 16px 22px;
    border-radius: 14px 14px 0 0;

  .card-level3 .card-header h2 { font-size: 14px; font-weight: 700; line-height: 1.4; }

    color: #333;

    color: #888;

    margin-bottom: 2px;
  }

    flex-direction: column;
    gap: 4px;
    align-items: center;
  }
  .card-instructor .instructor-tag {

    background: #fff;
    color: #4A686A;
    padding: 3px 8px;
    border-radius: 10px;
    border: 1px solid #d5d0c7;
    text-align: center;
    line-height: 1.4;

    padding: 20px 24px;
    max-height: 340px;
    overflow-y: auto;
  }
  .card-instructor .instructor-right p {
    font-size: 12px;
    line-height: 1.8;
    color: #555;
    margin-bottom: 10px;
  }
  .card-instructor .instructor-section {
    margin-bottom: 12px;
  }
  .card-instructor .instructor-section:last-child { margin-bottom: 0; }
  .card-instructor .instructor-section h4 {
    font-size: 11px;
    color: #56642A;
    font-weight: 700;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .card-instructor .instructor-section p {
    font-size: 11px;
    line-height: 1.7;
    color: #666;
    margin-bottom: 0;
  }

  .modal-card::-webkit-scrollbar { width: 5px; }
  .modal-card::-webkit-scrollbar-track { background: transparent; }
  .modal-card::-webkit-scrollbar-thumb { background: #c5cdcd; border-radius: 3px; }

  @media (max-width: 800px) {
    .card-instructor .instructor-body { flex-direction: column; }
    .card-instructor .instructor-left { width: 100%; border-right: none; border-bottom: 1px solid #e8ecec; }
    .card-instructor .instructor-right { max-height: 260px; }
    .header { padding: 10px 14px; flex-direction: column; align-items: flex-start; gap: 6px; }
    .legend { flex-wrap: wrap; gap: 10px; }
    .card-level1 .card-body { grid-template-columns: 1fr; }
    .card-level1, .card-level2, .card-level3 { max-width: 95vw; width: auto; }
  }
</style>
</head>

const links = [
  { source: 'course', target: 'm1' },
  { source: 'course', target: 'm2' },
  { source: 'course', target: 'm3' },
  { source: 'course', target: 'm4' },
  { source: 'course', target: 'm5' },
  { source: 'm1', target: 'm1-k1' },
  { source: 'm1', target: 'm1-k2' },
  { source: 'm1', target: 'm1-k3' },
  { source: 'm2', target: 'm2-k1' },
  { source: 'm2', target: 'm2-k2' },
  { source: 'm2', target: 'm2-k3' },
  { source: 'm3', target: 'm3-k1' },
  { source: 'm3', target: 'm3-k2' },
  { source: 'm3', target: 'm3-k3' },
  { source: 'm3', target: 'm3-k4' },

  { source: 'm4', target: 'm4-k3' },

// ===================== LAYOUT =====================
const canvas = document.getElementById('graph-canvas');
const ctx = canvas.getContext('2d');
let width, height;
let transform = { x: 0, y: 0, k: 1 };
let hoveredNode = null;
let isDragging = false;
let dragStart = { x: 0, y: 0 };
let dragStartTransform = { x: 0, y: 0 };
let hasDragged = false;

function resize() {
  width = window.innerWidth;
  height = window.innerHeight;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';
}

function initPositions() {
  const cx = width / 2;
  const cy = height / 2 + 20;

  // Level 1
  const course = nodes.find(n => n.id === 'course');
  course.radius = Math.min(56, width * 0.048);
  course.x = cx;
  course.y = cy;

  // Level 2
  const mNodes = nodes.filter(n => n.level === 2);
  const mRadius = Math.min(46, width * 0.04);
  mNodes.forEach(n => n.radius = mRadius);

  const minGap = 40;
  const minR2 = (2 * mRadius + minGap) / (2 * Math.sin(Math.PI / 5));
  const preferredR2 = Math.min(width, height) * 0.19;
  const r2 = Math.max(minR2, Math.min(preferredR2, 220));

  mNodes.forEach((n, i) => {
    const angle = (i / mNodes.length) * Math.PI * 2 - Math.PI / 2;
    n.x = cx + Math.cos(angle) * r2;
    n.y = cy + Math.sin(angle) * r2;
  });

  // Level 3
  const kRadius = Math.min(26, width * 0.022);
  nodes.filter(n => n.level === 3).forEach(n => n.radius = kRadius);

  nodes.filter(n => n.level === 3).forEach(n => {
    const parent = nodes.find(p => p.id === n.parent);
    const siblings = nodes.filter(s => s.parent === n.parent);
    const count = siblings.length;
    const idx = siblings.indexOf(n);

    // Parent angle from L1 center
    const parentAngle = Math.atan2(parent.y - cy, parent.x - cx);

    // Spread angle based on count
    const spreadDeg = count === 4 ? 100 : count === 3 ? 72 : 60;
    const spread = Math.PI * spreadDeg / 180;

    // Minimum radius to avoid sibling overlap, based on actual angular step inside spread
    const kMinGap = 18;
    let minR3;
    if (count <= 1) {
      minR3 = 90;
    } else {
      const halfStep = spread / (2 * (count - 1));
      minR3 = (2 * kRadius + kMinGap) / (2 * Math.sin(halfStep));
    }
    const preferredR3 = Math.min(width, height) * 0.14;
    const r3 = Math.max(minR3, Math.min(preferredR3, 150));

    const startAngle = parentAngle - spread / 2;
    const angle = startAngle + (count > 1 ? (idx / (count - 1)) * spread : 0);
    n.x = parent.x + Math.cos(angle) * r3;
    n.y = parent.y + Math.sin(angle) * r3;
  });
}

function draw() {
  ctx.clearRect(0, 0, width, height);
  ctx.save();
  ctx.translate(transform.x, transform.y);
  ctx.scale(transform.k, transform.k);

  // Links
  links.forEach(l => {
    const a = nodes.find(n => n.id === l.source);
    const b = nodes.find(n => n.id === l.target);
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.setLineDash([5, 6]);
    ctx.strokeStyle = 'rgba(160, 160, 160, 0.5)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Nodes: draw level 3 first, then 2, then 1 (level 1 on top)
  [3, 2, 1].forEach(level => {
    nodes.filter(n => n.level === level).forEach(n => {
    // Hover ring — single layer, light tech feel
    if (n === hoveredNode) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.radius + 10, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(200, 210, 225, 0.65)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Shadow
    ctx.beginPath();
    ctx.arc(n.x, n.y + 3, n.radius, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fill();

    // Circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
    ctx.fillStyle = n.color;
    ctx.fill();

    // White border
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = n === hoveredNode ? 2.5 : 1.8;
    ctx.stroke();

    // Label
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const fontSize = n.level === 1 ? 14 : (n.level === 2 ? 11 : 10);
    ctx.font = (n === hoveredNode ? 'bold ' : '') + fontSize + 'px "Microsoft YaHei", sans-serif';
    const lines = n.label.split('\n');
    const lineHeight = fontSize + 2;
    const startY = n.y - (lines.length - 1) * lineHeight / 2;
    lines.forEach((line, i) => {
      ctx.fillText(line, n.x, startY + i * lineHeight);
    });

    // Solo badge for level 2
    if (n.level === 2 && n.solo) {
      const bx = n.x + n.radius * 0.68;
      const by = n.y - n.radius * 0.68;
      ctx.beginPath();
      ctx.arc(bx, by, 11, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bx, by, 11, 0, Math.PI * 2);
      ctx.strokeStyle = n.color;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = n.color;
      ctx.font = 'bold 10px sans-serif';
      ctx.fillText('0.5', bx, by + 1);
    }
  });
  });

  ctx.restore();
}

// ===================== INTERACTION =====================
function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left - transform.x) / transform.k,
    y: (e.clientY - rect.top - transform.y) / transform.k
  };
}

function findNode(pos) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dx = pos.x - n.x, dy = pos.y - n.y;
    if (dx * dx + dy * dy <= n.radius * n.radius) return n;
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  hasDragged = false;
  dragStart.x = e.clientX;
  dragStart.y = e.clientY;
  dragStartTransform.x = transform.x;
  dragStartTransform.y = transform.y;
});

canvas.addEventListener('mousemove', e => {
  // Drag pan
  if (isDragging) {
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
      hasDragged = true;
      transform.x = dragStartTransform.x + dx;
      transform.y = dragStartTransform.y + dy;
      canvas.style.cursor = 'grabbing';
      draw();
      return;
    }
  }

  const pos = getMousePos(e);
  const node = findNode(pos);
  hoveredNode = node;
  canvas.style.cursor = isDragging ? 'grabbing' : (node ? 'pointer' : 'default');

  const tooltip = document.getElementById('tooltip');
  if (node) {
    tooltip.textContent = node.level === 1 ? '点击查看完整课程详情' :
      node.level === 2 ? (node.solo ? '点击查看模块详情 · 可单独开设0.5天' : '点击查看模块详情') :
      '点击查看知识点详情';
    tooltip.style.left = (e.clientX + 10) + 'px';
    tooltip.style.top = (e.clientY - 28) + 'px';
    tooltip.classList.add('active');
  } else {
    tooltip.classList.remove('active');
  }
  draw();
});

canvas.addEventListener('mouseup', e => {
  isDragging = false;
  canvas.style.cursor = 'default';
  // If it was a small movement without dragging, treat as click
  if (!hasDragged) {
    const pos = getMousePos(e);
    const node = findNode(pos);
    if (node) openModal(node);
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = e.deltaY > 0 ? 0.92 : 1.08;
  const newK = Math.max(0.3, Math.min(3, transform.k * zoomFactor));
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  transform.x = mx - (mx - transform.x) * (newK / transform.k);
  transform.y = my - (my - transform.y) * (newK / transform.k);
  transform.k = newK;
  draw();
}, { passive: false });

// Touch
let lastTouchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const pos = getMousePos(t);
    const node = findNode(pos);
    if (node) openModal(node);
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx*dx + dy*dy);
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2 && lastTouchDist > 0) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const zoomFactor = dist / lastTouchDist;
    const newK = Math.max(0.3, Math.min(3, transform.k * zoomFactor));
    const cx = width / 2, cy = height / 2;
    transform.x = cx - (cx - transform.x) * (newK / transform.k);
    transform.y = cy - (cy - transform.y) * (newK / transform.k);
    transform.k = newK;
    lastTouchDist = dist;
    draw();
  }
}, { passive: false });

// ===================== CONTROLS =====================
function resetView() {
  transform = { x: 0, y: 0, k: 1 };
  initPositions();
  draw();
}

function zoomIn() {
  const newK = Math.min(3, transform.k * 1.2);
  const cx = width / 2, cy = height / 2;
  transform.x = cx - (cx - transform.x) * (newK / transform.k);
  transform.y = cy - (cy - transform.y) * (newK / transform.k);
  transform.k = newK;
  draw();
}

function zoomOut() {
  const newK = Math.max(0.3, transform.k / 1.2);
  const cx = width / 2, cy = height / 2;
  transform.x = cx - (cx - transform.x) * (newK / transform.k);
  transform.y = cy - (cy - transform.y) * (newK / transform.k);
  transform.k = newK;
  draw();
}
