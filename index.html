<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background-color: #f5f0e8;
    color: #333;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
  }
  .header {
    text-align: center;
    margin-bottom: 50px;
  }
  .header h1 {
    font-size: 28px;
    color: #3C4F6D;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }
  .header p {
    font-size: 14px;
    color: #888;
  }
  .course-list {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;

    max-width: 900px;
  }
  .course-card {

    border-radius: 14px;
    padding: 28px 32px;

    max-width: 90vw;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    border: 1px solid #e8e0d4;
    transition: transform 0.2s, box-shadow 0.2s;
    text-decoration: none;
    color: inherit;
  }
  .course-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
  }
  .course-number {
    font-size: 12px;
    color: #FDB137;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .course-title {
    font-size: 18px;
    font-weight: 700;
    color: #3C4F6D;
    margin-bottom: 8px;
  }
  .course-instructor {
    font-size: 13px;
    color: #56642A;
    margin-bottom: 12px;
  }
  .course-meta {
    font-size: 12px;
    color: #999;
  }
  .logo {
    position: fixed;
    bottom: 16px;
    right: 16px;
    height: 36px;
    opacity: 0.85;
  }

</head>
